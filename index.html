<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC Engenharia - Cartão Virtual Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        /* Fundo Líquido Otimizado (GPU Accelerated) */
        .liquid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(180deg, #001a33 0%, #000 100%);
            /* Reduzido o blur para melhorar performance */
            filter: blur(60px);
            will-change: transform;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.5;
            will-change: transform;
            animation: move 25s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 450px;
            height: 450px;
            background: #007aff;
            top: -5%;
            left: -5%;
        }

        .blob-2 {
            width: 350px;
            height: 350px;
            background: #5856d6;
            bottom: 5%;
            right: -5%;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: #00c7ff;
            top: 35%;
            left: 45%;
            animation-delay: -10s;
        }

        @keyframes move {
            0% { transform: translate3d(0, 0, 0) scale(1); }
            50% { transform: translate3d(60px, 40px, 0) scale(1.1); }
            100% { transform: translate3d(-30px, 80px, 0) scale(0.9); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* Cartão Vidro Otimizado */
        .card {
            background: rgba(255, 255, 255, 0.06);
            /* Backdrop filter pode ser pesado, ajustado para equilíbrio */
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 45px;
            padding: 50px 35px;
            color: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .top-badge {
            position: absolute;
            top: 35px;
            right: 35px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo-container {
            margin-bottom: 45px;
        }

        .logo-circle {
            width: 65px;
            height: 65px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-info {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .company-name {
            font-size: 18px;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
        }

        .main-title {
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .tags-container {
            display: flex;
            gap: 10px;
            margin-bottom: 45px;
        }

        .tag {
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 20px;
            border-radius: 14px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        /* Botões Otimizados (Sem transições pesadas) */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            /* Transição simplificada para evitar lag */
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.12);
        }

        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .btn-insta {
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-insta:hover {
            background: rgba(188, 24, 136, 0.3);
        }

        .divider {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 35px;
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .info-sub {
            font-size: 14px;
            opacity: 0.5;
        }

        .visit-site {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 480px) {
            .card {
                padding: 40px 25px;
            }
            .main-title {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="top-badge">
                Saved <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
            </div>

            <div class="logo-container">
                <div class="logo-circle">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 5C11.7157 5 5 11.7157 5 20C5 28.2843 11.7157 35 20 35C28.2843 35 35 28.2843 35 20C35 11.7157 28.2843 5 20 5Z" stroke="#0074D9" stroke-width="3"/>
                        <path d="M10 20H15L18 15L22 25L25 20H30" stroke="#0074D9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>

            <div class="header-info">
                <span class="company-name">SEC Engenharia</span>
                <div class="status-dot"></div>
            </div>

            <h1 class="main-title">Desenvolver<br>para Evoluir</h1>

            <div class="tags-container">
                <div class="tag">Elétrica</div>
                <div class="tag">Segurança</div>
            </div>

            <div class="action-buttons">
                <a href="https://wa.me/5573991396879" class="btn btn-primary">Solicitar Orçamento</a>
                <a href="https://www.instagram.com/sec.eng/" class="btn btn-insta">Siga no Instagram</a>
            </div>

            <div class="divider"></div>

            <div class="footer-info">
                <div class="info-box">
                    <div class="info-title">SEC Engenharia</div>
                    <div class="info-sub">Eunápolis, Bahia</div>
                </div>
                <a href="https://sec.eng.br/" class="visit-site">Site</a>
            </div>
        </div>
    </div>

</body>
</html>
